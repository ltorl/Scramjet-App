<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DaydreamX - Proxy</title>
    <style>
        /* Modern Glassmorphic UI with glowing accents */
        :root {
            --glow-color: rgba(0, 195, 255, 0.6);
            --accent-color: #45a29e;
            --accent-glow: #66fcf1;
            --bg-dark: #0b0c10;
        }

        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            margin: 0; 
            height: 100vh; 
            background: linear-gradient(135deg, #0b0c10 0%, #1f2833 100%);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: #fff;
        }

        /* Centered Search UI */
        #search-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 10;
        }

        /* Active Mode (Transitions to top navbar) */
        #search-container.active-mode {
            top: 0;
            transform: translate(-50%, 0);
            padding: 15px 0;
            flex-direction: row;
            justify-content: space-between;
            background: rgba(11, 12, 16, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
            gap: 0;
        }

        .title {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 20px var(--glow-color);
            margin: 0;
            transition: all 0.6s ease;
            cursor: default;
        }

        #search-container.active-mode .title {
            font-size: 1.5rem;
            margin-left: 30px;
            text-shadow: 0 0 10px rgba(69, 162, 158, 0.5);
            color: var(--accent-glow);
        }

        .input-group {
            display: flex;
            width: 90%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .input-group:focus-within {
            border-color: rgba(0, 195, 255, 0.4);
            box-shadow: 0 0 25px rgba(0, 195, 255, 0.15);
        }

        #search-container.active-mode .input-group {
            width: 50%;
            margin-right: 30px;
            max-width: 800px;
            padding: 4px;
        }

        #url-input { 
            flex-grow: 1; 
            padding: 14px 20px; 
            border: none; 
            background: transparent;
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        
        #url-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
            transition: color 0.3s ease;
        }

        #url-input:focus::placeholder {
            color: transparent;
        }

        button { 
            padding: 12px 28px; 
            cursor: pointer; 
            border-radius: 8px; 
            border: none; 
            background: var(--accent-color); 
            color: #0b0c10; 
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(69, 162, 158, 0.3);
        }
        
        button:hover { 
            background: var(--accent-glow);
            box-shadow: 0 0 25px rgba(102, 252, 241, 0.5);
            transform: scale(1.02);
        }

        /* Iframe Styles */
        #content-frame { 
            position: absolute;
            top: 80px; 
            left: 0;
            width: 100%; 
            height: calc(100vh - 80px);
            border: none; 
            background-color: #fff;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease 0.2s; /* Delayed fade-in */
            z-index: 1;
        }

        #content-frame.visible {
            opacity: 1;
            pointer-events: all;
        }
    </style>

    <script src="https://scramjet-app-ic0b.onrender.com/scramjet/scramjet.codecs.js"></script>
    <script src="https://scramjet-app-ic0b.onrender.com/scramjet/scramjet.config.js"></script>
    <script src="https://scramjet-app-ic0b.onrender.com/epoxy/index.js"></script>
</head>
<body>

    <div id="search-container">
        <h1 class="title">DaydreamX</h1>
        <div class="input-group">
            <input type="text" id="url-input" placeholder="Search with DuckDuckGo or enter URL..." autocomplete="off" spellcheck="false">
            <button id="go-btn">Go</button>
        </div>
    </div>
    
    <iframe id="content-frame"></iframe>

    <script>
        const input = document.getElementById('url-input');
        const button = document.getElementById('go-btn');
        const iframe = document.getElementById('content-frame');
        const searchContainer = document.getElementById('search-container');

        async function registerSW() {
            if ('serviceWorker' in navigator) {
                try {
                    await navigator.serviceWorker.register('https://scramjet-app-ic0b.onrender.com/scramjet/sw.js', {
                        scope: __scramjet.prefix
                    });
                    console.log('Scramjet Service Worker registered successfully.');
                } catch (err) {
                    console.error('Service Worker registration failed:', err);
                }
            }
        }

        function initEpoxy() {
            try {
                window.epoxyTransport = new EpoxyClient('wss://scramjet-app-ic0b.onrender.com/wisp/');
                console.log('Epoxy Wisp Transport initialized.');
            } catch (err) {
                console.error('Epoxy initialization error:', err);
            }
        }

        function navigate(query) {
            query = query.trim();
            if (!query) return;

            let url = query;
            const isUrl = url.includes('.') && !url.includes(' ');
            
            if (!isUrl) {
                // Changed search engine to DuckDuckGo
                url = `https://duckduckgo.com/?q=${encodeURIComponent(query)}`;
            } else if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }

            const encodedUrl = 'https://scramjet-app-ic0b.onrender.com' + __scramjet.prefix + __scramjet.encodeUrl(url);
            
            // Apply CSS transitions to shift UI from center to top navbar
            searchContainer.classList.add('active-mode');
            iframe.classList.add('visible');
            
            iframe.src = encodedUrl;
            
            // Optional: Unfocus the input so the mobile keyboard drops down
            input.blur(); 
        }

        // Event Listeners
        button.addEventListener('click', () => navigate(input.value));
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') navigate(input.value);
        });

        // Initialize Services
        window.addEventListener('DOMContentLoaded', () => {
            registerSW();
            initEpoxy();
            
            // Allow clicking the top-left title to reset the view
            document.querySelector('.title').addEventListener('click', () => {
                if (searchContainer.classList.contains('active-mode')) {
                    searchContainer.classList.remove('active-mode');
                    iframe.classList.remove('visible');
                    setTimeout(() => iframe.src = '', 300);
                    input.value = '';
                }
            });
        });
    </script>
</body>
</html>
